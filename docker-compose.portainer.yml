# ══════════════════════════════════════════════════════════════════════════════
# fw-path-tracker – Portainer-Stack (Build hinter Corporate-Proxy)
#
# Deploy in Portainer:  Stacks → Add stack → "Repository" (dieses Git-Repo),
#   Compose path: docker-compose.portainer.yml
#   Unter "Environment variables" setzen (Werte anpassen):
#     HTTP_PROXY   = http://PROXYHOST:PORT
#     HTTPS_PROXY  = http://PROXYHOST:PORT
#     NO_PROXY     = localhost,127.0.0.1,::1,db,api,frontend,fmg-sim,.local
#     POSTGRES_PASSWORD, JWT_SECRET, ADMIN_PASSWORD  (Secrets)
#
# WICHTIG — zwei Proxy-Ebenen:
#   • RUN-Schritte (apt/pip/npm)      → über build.args unten (dieser Stack) ✔
#   • FROM-Pull der Base-Images       → macht der Docker-DAEMON, NICHT dieser
#     Stack. Dafür EINMALIG auf dem Portainer-Host /etc/docker/daemon.json:
#         { "proxies": { "http-proxy": "http://PROXYHOST:PORT",
#                        "https-proxy": "http://PROXYHOST:PORT",
#                        "no-proxy": "localhost,127.0.0.1,::1" } }
#     danach:  systemctl restart docker
#   HTTP_PROXY/HTTPS_PROXY/NO_PROXY sind vordefinierte Build-Args — sie wirken
#   in RUN, ohne dass ein ARG deklariert werden muss, und landen NICHT im Image.
#
#   Proxy nur für den BUILD. Die Container machen zur Laufzeit KEINE Internet-
#   Zugriffe (FMG/iTop/DNS gehen ins Kundennetz) → bewusst KEINE Proxy-ENV in
#   den Runtime-`environment:`-Blöcken, sonst bräche u. a. der localhost-Health-
#   check der api.
# ══════════════════════════════════════════════════════════════════════════════

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# Proxy-Build-Args einmal definiert, per YAML-Anchor in jeden Build eingehängt.
x-proxy-args: &proxy-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${HTTP_PROXY:-}
  https_proxy: ${HTTPS_PROXY:-}
  no_proxy: ${NO_PROXY:-}

volumes:
  db-data:
  fmg-fixtures:
  certs:

services:
  db:
    image: postgres:16-alpine
    container_name: fwpt-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: fwtracker
      POSTGRES_USER: fwtracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fwtracker -d fwtracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      args: *proxy-args
    container_name: fwpt-api
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET muss gesetzt sein}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      FMG_RECORD_FIXTURES: ${FMG_RECORD_FIXTURES:-0}
    volumes:
      - ./migrations:/migrations:ro
      - fmg-fixtures:/fixtures
      - certs:/certs
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args: *proxy-args
    container_name: fwpt-frontend
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - certs:/certs:ro
    ports:
      - "${HTTP_PORT:-8766}:80"
      - "${HTTPS_PORT:-8443}:443"

  fmg-sim:
    build:
      context: ./fmg-sim
      args: *proxy-args
    container_name: fwpt-fmg-sim
    restart: unless-stopped
    logging: *default-logging
    profiles: ["sim"]
    volumes:
      - ./fmg-sim/lab.yaml:/app/lab.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,ssl; urllib.request.urlopen('https://localhost/healthz', context=ssl._create_unverified_context(), timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
