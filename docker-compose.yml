# ══════════════════════════════════════════════════════════════════════════════
# fw-path-tracker – Docker Compose
#
# Starten:  cp .env.example .env  →  Secrets setzen  →  docker compose up -d
# Frontend: http://<host>/   (Login initial: admin / $ADMIN_PASSWORD)
# ══════════════════════════════════════════════════════════════════════════════

# Log-Rotation pro Container (ids-Muster): 5 × 50 MB
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

volumes:
  db-data:
  fmg-fixtures:   # Aufgezeichnete FMG-Antworten (FMG_RECORD_FIXTURES=1 / Demo)

services:
  db:
    image: postgres:16-alpine
    container_name: fwpt-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: fwtracker
      POSTGRES_USER: fwtracker
      # Fail-closed: ohne gesetztes Secret startet der Stack nicht.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fwtracker -d fwtracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: fwpt-api
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET muss in .env gesetzt sein}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      FMG_RECORD_FIXTURES: ${FMG_RECORD_FIXTURES:-0}
    volumes:
      - ./migrations:/migrations:ro
      - fmg-fixtures:/fixtures
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: fwpt-frontend
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

  # FortiManager-JSON-RPC-Simulator (nur mit `--profile sim`).
  # Trocken-Testen des kompletten Stacks ohne echtes Lab. Im Tracker unter
  # Einstellungen → FortiManager konfigurieren: host=fmg-sim, ssl_verify=false,
  # auth_mode=token, token=<beliebig>, adoms=[corp]. Topologie: fmg-sim/lab.yaml.
  fmg-sim:
    build: ./fmg-sim
    container_name: fwpt-fmg-sim
    restart: unless-stopped
    logging: *default-logging
    profiles: ["sim"]
    volumes:
      - ./fmg-sim/lab.yaml:/app/lab.yaml:ro   # Topologie editierbar (POST /_reload)
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,ssl; urllib.request.urlopen('https://localhost/healthz', context=ssl._create_unverified_context(), timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
